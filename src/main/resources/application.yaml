spring:
  application:
    name: rtvs
  datasource:
    url: jdbc:postgresql://localhost:5432/rtvsdb
    username: postgres
    password: 3893
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: your-256-bit-secret-key-here-minimum-32-chars-padded
  expiration-ms: 86400000   # 24 hours
